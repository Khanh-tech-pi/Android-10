<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android 10 Simulation</title>
    <style>
        :root {
            --android-bg: #000;
            --screen-bg: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2070&auto=format&fit=crop');
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            font-family: 'Roboto', sans-serif;
        }

        /* Thân máy điện thoại */
        .phone-case {
            width: 320px;
            height: 650px;
            background: #1a1a1a;
            border-radius: 40px;
            border: 8px solid #333;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* Màn hình */
        .screen {
            width: 100%;
            height: 100%;
            background: var(--screen-bg);
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Thanh trạng thái (Status Bar) */
        .status-bar {
            height: 30px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 12px;
            background: rgba(0,0,0,0.2);
        }

        /* Lưới ứng dụng */
        .app-grid {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 40px 20px;
        }

        .app-icon {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.9);
            border-radius: 12px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .app-icon:active {
            transform: scale(0.9);
        }

        /* Thanh điều hướng Android 10 (Gesture Bar) */
        .nav-bar {
            height: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gesture-dash {
            width: 100px;
            height: 4px;
            background: white;
            border-radius: 2px;
            opacity: 0.8;
        }

        /* Đồng hồ chính */
        .clock {
            color: white;
            text-align: center;
            margin-top: 50px;
            font-size: 48px;
            font-weight: 300;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="phone-case">
        <div class="screen">
            <div class="status-bar">
                <span id="time">12:00</span>
                <span>📶 🔋 98%</span>
            </div>

            <div class="clock" id="large-clock">12:00</div>

            <div class="app-grid">
                <div class="app-icon" onclick="alert('Mở Điện thoại...')">📞</div>
                <div class="app-icon" onclick="alert('Mở Tin nhắn...')">💬</div>
                <div class="app-icon" onclick="alert('Mở Chrome...')">🌐</div>
                <div class="app-icon" onclick="alert('Mở Máy ảnh...')">📷</div>
                <div class="app-icon" onclick="alert('Mở Cài đặt...')">⚙️</div>
            </div>

            <div class="nav-bar">
                <div class="gesture-dash"></div>
            </div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                            now.getMinutes().toString().padStart(2, '0');
            document.getElementById('time').innerText = timeStr;
            document.getElementById('large-clock').innerText = timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
  </html>
